
name: aix86 Build

on:
  workflow_dispatch:
    inputs:
      target_arch:
        description: '目标架构'
        required: false
        default: 'x86_64'
      custom_config:
        description: '自定义配置文件URL(可选)'
        required: false
  schedule:
    - cron: '0 0 * * 3'
  repository_dispatch:

env:
  TARGET_ARCH: x86_64
  BUILD_THREADS: 4
  CCACHE_DIR: /tmp/ccache

jobs:
  prepare:
    name: 准备构建环境
    runs-on: ubuntu-22.04
    outputs:
      should_build: ${{ steps.version_check.outputs.should_build }}
      latest_tag: ${{ steps.get_release.outputs.tag }}
      build_date: ${{ steps.date.outputs.date }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 获取系统时间
        id: date
        run: echo "date=$(date +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: 设置更高线程数
        run: |
          CORES=$(nproc)
          echo "BUILD_THREADS=$((CORES > 8 ? 8 : CORES))" >> $GITHUB_ENV

      - name: 检查最新稳定版
        id: get_release
        run: |
          TAG=$(curl -s https://api.github.com/repos/openwrt/openwrt/releases/latest | jq -r ".tag_name")
          if [[ -z "$TAG" || "$TAG" == "null" ]]; then
            echo "获取版本失败，尝试备用方式..."
            TAG=$(git ls-remote --tags --refs https://github.com/openwrt/openwrt.git | \
              awk -F/ '{print $NF}' | grep -E '^v[0-9]' | grep -v 'rc\|beta' | sort -V | tail -n1)
          fi
          if [ -z "$TAG" ]; then
            echo "::error::无法获取OpenWrt最新版本号"
            exit 1
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "✅ 当前最新版本: $TAG"

      - name: 恢复版本缓存
        id: version_cache
        uses: actions/cache/restore@v4
        with:
          path: .last_build_info
          key: version-info-${{ runner.os }}

      - name: 版本对比决策
        id: version_check
        run: |
          PREV_TAG=""
          if [[ -f .last_build_info ]]; then
            source .last_build_info
          fi

          CURRENT_TAG="${{ steps.get_release.outputs.tag }}"
          if [[ "$PREV_TAG" == "$CURRENT_TAG" ]]; then
            echo "当前版本与上次构建相同，跳过构建"
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "发现新版本: $CURRENT_TAG，开始构建"
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

          echo "PREV_TAG=$PREV_TAG" > .last_build_info
          echo "CURRENT_TAG=$CURRENT_TAG" >> .last_build_info

      - name: 保存版本缓存
        uses: actions/cache/save@v4
        with:
          path: .last_build_info
          key: version-info-${{ runner.os }}-${{ steps.date.outputs.date }}

  build:
    name: 构建固件
    needs: prepare
    if: ${{ needs.prepare.outputs.should_build == 'true' }}
    runs-on: ubuntu-22.04
    steps:
      - name: 清理空间
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: 设置缓存
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ needs.prepare.outputs.build_date }}

      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget jq

      - name: 克隆源码
        run: |
          git clone --branch ${{ needs.prepare.outputs.latest_tag }} --single-branch \
            https://github.com/openwrt/openwrt.git openwrt
          cd openwrt

      - name: 更新feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 添加自定义feeds
        run: |
          cd openwrt
          echo "src-git-full packages https://github.com/openwrt/packages.git" >> feeds.conf.default
          echo "src-git-full luci https://github.com/openwrt/luci.git" >> feeds.conf.default
          echo "src-git-full routing https://github.com/openwrt/routing.git" >> feeds.conf.default
          echo "src-git-full telephony https://github.com/openwrt/telephony.git" >> feeds.conf.default
          echo "src-git-full msd_lite https://github.com/ximiTech/luci-app-msd_lite.git" >> feeds.conf.default
          echo "src-git-full passwall https://github.com/xiaorouji/openwrt-passwall.git" >> feeds.conf.default
          echo "src-git-full passwall_packages https://github.com/xiaorouji/openwrt-passwall-packages.git" >> feeds.conf.default
          echo "src-git-full lucky https://github.com/sirpdboy/luci-app-lucky.git" >> feeds.conf.default
          echo "src-git-full rtp2httpd https://github.com/stackia/rtp2httpd.git" >> feeds.conf.default

      - name: 应用自定义配置
        run: |
          cd openwrt
          # 这里可以添加自定义配置逻辑
          # 如果提供了自定义配置URL，则下载并应用
         if: steps.compare.outputs.should_build == 'true'
        working-directory: ./openwrt
        run: |
          cp ../config/.config .config
          if [ -f ../config/customize.sh ]; then
            bash ../config/customize.sh
          fi

      - name: 下载依赖包
        run: |
          cd openwrt
          make download -j${{ env.BUILD_THREADS }}

      - name: 编译固件
        run: |
          cd openwrt
          make -j${{ env.BUILD_THREADS }} V=s

      - name: 打包产物
        run: |
          cd openwrt/bin/targets/x86/64
          ls -la
          # 压缩镜像文件
          for img in *.img; do
            if [ -f "$img" ]; then
              gzip "$img"
            fi
          done

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-x86_64-firmware-${{ needs.prepare.outputs.build_date }}
          path: openwrt/bin/targets/x86/64/*.gz

      - name: 发布版本
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare.outputs.latest_tag }}-${{ needs.prepare.outputs.build_date }}
          name: OpenWrt x86_64 ${{ needs.prepare.outputs.latest_tag }} 自动构建 ${{ needs.prepare.outputs.build_date }}
          files: openwrt/bin/targets/x86/64/*.gz
          draft: false
          prerelease: false

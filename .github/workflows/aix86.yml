name: OpenWrt x86_64 Build

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 3'  # UTC每周三00:00 (北京时间08:00)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev libssl-dev \
          python3 unzip jq rsync qemu-utils

      # 版本控制模块
      - name: Restore build version cache
        id: version-cache
        uses: actions/cache/restore@v4
        with:
          path: last_build_version.txt
          key: openwrt-version-cache

      - name: Get latest stable release
        id: get_tag
        run: |
          TAG=$(git ls-remote --tags --refs https://github.com/openwrt/openwrt.git \
          | awk -F/ '{print $NF}' | grep -E '^v[0-9]' | grep -v 'rc' | sort -V | tail -n1)
          echo "latest_tag=$TAG" >> $GITHUB_OUTPUT

      - name: Version comparison
        id: compare
        run: |
          [ -f last_build_version.txt ] && LAST_VER=$(cat last_build_version.txt) || LAST_VER="null"
          [ "$LAST_VER" = "${{ steps.get_tag.outputs.latest_tag }}" ] \
          && echo "build_flag=false" >> $GITHUB_OUTPUT \
          || echo "build_flag=true" >> $GITHUB_OUTPUT

      - name: Skip build notice
        if: steps.compare.outputs.build_flag == 'false'
        run: echo "🔄 Current version ${{ steps.get_tag.outputs.latest_tag }} already built"

      # 构建模块
      - name: Free disk space
        if: steps.compare.outputs.build_flag == 'true'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true

      - name: Prepare build environment
        if: steps.compare.outputs.build_flag == 'true'
        run: |
          git clone https://github.com/openwrt/openwrt.git -b ${{ steps.get_tag.outputs.latest_tag }}
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure target
        if: steps.compare.outputs.build_flag == 'true'
        run: |
          cd openwrt
          printf "CONFIG_TARGET_x86=y\nCONFIG_TARGET_x86_64=y\n" > .config
          make defconfig

      - name: Compile firmware
        if: steps.compare.outputs.build_flag == 'true'
        env:
          GITHUB_ACTIONS: "false"  # 绕过Rust CI检测
          CARGO_BUILD_JOBS: 2      # 限制并发防OOM
        run: |
          cd openwrt
          make -j$(($(nproc)-1)) || make -j1 V=s

      # 输出模块
      - name: Save build version
        if: steps.compare.outputs.build_flag == 'true'
        run: echo "${{ steps.get_tag.outputs.latest_tag }}" > last_build_version.txt

      - name: Upload artifact
        if: steps.compare.outputs.build_flag == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-x86_64-${{ steps.get_tag.outputs.latest_tag }}
          path: openwrt/bin/targets/x86/64/*.img.gz

      - name: Update version cache
        uses: actions/cache/save@v4
        with:
          path: last_build_version.txt
          key: ${{ steps.version-cache.output.cache-primary-key }}

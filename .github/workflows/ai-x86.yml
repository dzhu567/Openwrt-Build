name: OpenWrt x86_64 ai Build

on:
  workflow_dispatch:
    inputs:
      target_arch:
        description: '目标架构'
        required: false
        default: 'x86_64'
      custom_config:
        description: '自定义配置文件URL(可选)'
        required: false
  schedule:
    - cron: '0 2 * * * 4'  # 每周四凌晨2点执行

env:
  TARGET_ARCH: x86_64
  BUILD_THREADS: 4
  CCACHE_DIR: /tmp/ccache

jobs:
  prepare:
    name: 准备构建环境
    runs-on: ubuntu-22.04
    outputs:
      should_build: ${{ steps.version_check.outputs.should_build }}
      latest_tag: ${{ steps.get_release.outputs.tag }}
      build_date: ${{ steps.date.outputs.date }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: 获取系统时间
        id: date
        run: echo "date=$(date +%Y%m%d)" >> $GITHUB_OUTPUT
      
      - name: 设置更高线程数
        run: |
          CORES=$(nproc)
          echo "BUILD_THREADS=$((CORES > 8 ? 8 : CORES))" >> $GITHUB_ENV
      
      - name: 检查最新稳定版
        id: get_release
        run: |
          TAG=$(curl -s https://api.github.com/repos/openwrt/openwrt/releases/latest | jq -r ".tag_name")
          if [[ -z "$TAG" || "$TAG" == "null" ]]; then
            echo "获取版本失败，尝试备用方式..."
            TAG=$(git ls-remote --tags --refs https://github.com/openwrt/openwrt.git | \
                  awk -F/ '{print $NF}' | grep -E '^v[0-9]' | grep -v 'rc\|beta' | sort -V | tail -n1)
          fi
          if [ -z "$TAG" ]; then
            echo "::error::无法获取OpenWrt最新版本号"
            exit 1
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "✅ 当前最新版本: $TAG"

      - name: 恢复版本缓存
        id: version_cache
        uses: actions/cache/restore@v4
        with:
          path: .last_build_info
          key: version-info-${{ runner.os }}
      
      - name: 版本对比决策
        id: version_check
        run: |
          PREV_TAG=""
          if [[ -f .last_build_info ]]; then
            source .last_build_info
          fi
          
          CURRENT_TAG="${{ steps.get_release.outputs.tag }}"
          if [[ "$PREV_TAG" == "$CURRENT_TAG" ]]; then
            echo "当前版本与上次构建相同，跳过构建"
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "发现新版本: $CURRENT_TAG，开始构建"
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi
          
          echo "PREV_TAG=$PREV_TAG" > .last_build_info
          echo "CURRENT_TAG=$CURRENT_TAG" >> .last_build_info
          
      - name: 保存版本缓存
        uses: actions/cache/save@v4
        with:
          path: .last_build_info
          key: version-info-${{ runner.os }}-${{ steps.date.outputs.date }}

  build:
    name: 构建固件
    needs: prepare
    if: ${{ needs.prepare.outputs.should_build == 'true' }}
    runs-on: ubuntu-22.04
    steps:
      - name: 清理空间
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          
      - name: 设置缓存
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ needs.prepare.outputs.build_date }}
          
      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget
          
      - name: 克隆源码
        run: |
          git clone --branch ${{ needs.prepare.outputs.latest_tag }} --single-branch \
            https://github.com/openwrt/openwrt.git openwrt
          cd openwrt
          
      - name: 更新feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
      - name: 添加自定义feeds
        run: |
          cd openwrt
          echo "src-git-full packages https://github.com/openwrt/packages.git" >> feeds.conf.default
          echo "src-git-full luci https://github.com/openwrt/luci.git" >> feeds.conf.default
          echo "src-git-full routing https://github.com/openwrt/routing.git" >> feeds.conf.default
          echo "src-git-full telephony https://github.com/openwrt/telephony.git" >> feeds.conf.default
          echo "src-git-full msd_lite https://github.com/ximiTech/luci-app-msd_lite.git" >> feeds.conf.default
          echo "src-git-full passwall https://github.com/xiaorouji/openwrt-passwall.git" >> feeds.conf.default
          echo "src-git-full passwall_packages https://github.com/xiaorouji/openwrt-passwall-packages.git" >> feeds.conf.default
           echo "src-git-full lucky https://github.com/sirpdboy/luci-app-lucky.git" >> feeds.conf.default
          echo "src-git-full rtp2httpd https://github.com/stackia/rtp2httpd.git" >> feeds.conf.default
         ./scripts/feeds update -a
          ./scripts/feeds install -a
          
      - name: 配置固件
        run: |
          cd openwrt
          # 默认配置
          make defconfig
          
          # 自定义配置
          cat > .config << 'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          
          # 禁用签名检查
          CONFIG_SIGNED_PACKAGES=n
          
          # 基础系统
          CONFIG_BUSYBOX_CUSTOM=y
          CONFIG_BUSYBOX_CONFIG_FEATURE_PS_LONG=y
          CONFIG_BUSYBOX_CONFIG_FEATURE_PS_TIME=y
          
          # 内核模块
          CONFIG_PACKAGE_kmod-usb-core=y
          CONFIG_PACKAGE_kmod-usb-ohci=y
          CONFIG_PACKAGE_kmod-usb-uhci=y
          CONFIG_PACKAGE_kmod-usb2=y
          CONFIG_PACKAGE_kmod-usb3=y
          CONFIG_PACKAGE_kmod-usb-storage=y
          CONFIG_PACKAGE_kmod-usb-storage-extras=y
          
          # 网络工具
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_wget=y
          CONFIG_PACKAGE_iperf3=y
          CONFIG_PACKAGE_tcpdump=y
          CONFIG_PACKAGE_htop=y
          
          # 文件系统
          CONFIG_PACKAGE_kmod-fs-ext4=y
          CONFIG_PACKAGE_kmod-fs-ntfs=y
          CONFIG_PACKAGE_kmod-fs-vfat=y
          
          # AI相关
          CONFIG_PACKAGE_python3=y
          CONFIG_PACKAGE_python3-pip=y
          CONFIG_PACKAGE_python3-numpy=y
          
          # LUCI界面
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-chinese=y
          
          # 网络服务
          CONFIG_PACKAGE_luci-app-upnp=y
          CONFIG_PACKAGE_luci-app-wol=y
          CONFIG_PACKAGE_luci-app-arpbind=y
          CONFIG_PACKAGE_luci-app-lucky=y
          CONFIG_PACKAGE_luci-app-msd_lite=y
          CONFIG_PACKAGE_luci-app-rtp2httpd=y
         
 # 存储服务
          CONFIG_PACKAGE_luci-app-diskman=y
          CONFIG_PACKAGE_luci-app-samba4=y
          
          # 代理工具
          CONFIG_PACKAGE_luci-app-passwall=y
         
          
          # 主题
          CONFIG_PACKAGE_luci-theme-argon=y
          EOF
          
          # 验证配置
          make defconfig
          
      - name: 下载包文件
        run: |
          cd openwrt
          make download -j${{ env.BUILD_THREADS }}
          
      - name: 编译固件
        run: |
          cd openwrt
          echo "开始编译..."
          make -j${{ env.BUILD_THREADS }} V=s
          
      - name: 整理产物
        run: |
          cd openwrt/bin/targets/x86/64
          ls -la
          
          # 重命名文件
          for file in *; do
            if [[ "$file" != *"${{ needs.prepare.outputs.build_date }}"* ]]; then
              mv "$file" "${file%.*}_${{ needs.prepare.outputs.build_date }}.${file##*.}"
            fi
          done
          
      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-x86_64-${{ needs.prepare.outputs.build_date }}
          path: openwrt/bin/targets/x86/64/*
          
      - name: 发布版本
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.latest_tag }}-${{ needs.prepare.outputs.build_date }}
          name: OpenWrt ${{ needs.prepare.outputs.latest_tag }} - ${{ needs.prepare.outputs.build_date }}
          files: openwrt/bin/targets/x86/64/*
          draft: false
          prerelease: false
